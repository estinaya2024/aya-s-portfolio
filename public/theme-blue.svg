<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Right half filled with accent color -->
  <path d="M12 2 A10 10 0 0 1 12 22 Z" fill="#5e71e9"/>
  <!-- Left half filled with accent color at lower opacity -->
  <path d="M12 2 A10 10 0 0 0 12 22 Z" fill="#5e71e9" opacity="0.2"/>
  <!-- Outer ring -->
  <circle cx="12" cy="12" r="10" stroke="#5e71e9" stroke-width="1.5" fill="none"/>
  <!-- Center dividing line -->
  <line x1="12" y1="2" x2="12" y2="22" stroke="#5e71e9" stroke-width="1.5"/>
</svg>
